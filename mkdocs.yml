site_name: Hub Consultare Docs
site_description: Documentacao tecnica do banco de dados
site_url: https://mspereira-consultare.github.io/consultare-hub/
repo_url: https://github.com/mspereira-consultare/consultare-hub
edit_uri: edit/main/

docs_dir: apps/painel/docs
site_dir: site

theme:
  name: material
  language: pt-BR
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - def_list
  - fenced_code
  - toc:
      permalink: true

nav:
  - Início: index.md
  - Banco MySQL:
      - Base do Banco: database/README.md
      - Visao Geral do Schema: database/01-visao-geral-do-schema-mysql.md
      - Relacionamentos Logicos: database/02-relacionamentos-logicos-mysql.md
      - Dicionario de Dados: database/03-dicionario-de-dados-mysql.md
      - Guia de Integracao: database/04-guia-de-integracao-mysql.md
      - Matriz de Escrita e Consumo: database/05-matriz-de-escrita-e-consumo.md
      - Contratos por Dominio: database/06-contratos-operacionais-por-dominio.md
      - Mapa API Rota para Tabelas: database/07-mapa-api-rotas-tabelas.md
